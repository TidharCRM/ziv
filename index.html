<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<title>זיו אהרונוב — שף לאירועים</title>

<meta name="description" content="זיו אהרונוב — שף לאירועים עם 35 שנות ניסיון. ארוחות שף פרטיות, קייטרינג לאירועים וסדנאות בישול. האירוע שלכם ראוי לשף אמיתי." />

<style>

    src:url('fonts/Mamilla-Light.woff2') format('woff2'); }

  @font-face { font-family:'Mamilla'; font-weight:700; font-display:swap;

  @font-face { font-family:'Mamilla'; font-weight:800; font-display:swap;

  /* Aviv — body / UI */
  @font-face { font-family:'FupAviv'; font-weight:300; font-display:swap;
    src:url('fonts/Aviv-Light.woff2') format('woff2'); }
  @font-face { font-family:'FupAviv'; font-weight:400; font-display:swap;
    src:url('fonts/Aviv-Regular.woff2') format('woff2'); }
  @font-face { font-family:'FupAviv'; font-weight:500; font-display:swap;
    src:url('fonts/Aviv-Medium.woff2') format('woff2'); }
  @font-face { font-family:'FupAviv'; font-weight:600; font-display:swap;
    src:url('fonts/Aviv-SemiBold.woff2') format('woff2'); }
  @font-face { font-family:'FupAviv'; font-weight:700; font-display:swap;
    src:url('fonts/Aviv-Bold.woff2') format('woff2'); }
  @font-face { font-family:'FupAviv'; font-weight:800; font-display:swap;
    src:url('fonts/Aviv-ExtraBold.woff2') format('woff2'); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --ink:#1A1612;
    --ink-2:#2A241D;
    --ink-3:#3B342A;
    --ink-muted:#8A7F63;              /* muted warm brown for text on light bg */
    --paper:#FAF4E2;
    --paper-2:#F2EAD0;
    --paper-3:#E9DDBA;
    --paper-muted:#C9BFA4;             /* muted warm beige for text on dark bg */
    --ember: oklch(0.56 0.16 38);
    --ember-deep: oklch(0.44 0.17 32);
    --rule: rgba(26,22,18,0.14);
    --rule-light: rgba(250,244,226,0.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'FupAviv','Heebo',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  .serif{font-family:'Mamilla','Playfair Display', Georgia, serif;font-weight:400;letter-spacing:-0.01em}
  .italic-en{font-family:'Playfair Display', Georgia, serif;font-style:italic;font-weight:400}
  .hand{font-family:'Caveat', cursive}
  .mono{font-family:'JetBrains Mono', ui-monospace, monospace;letter-spacing:0.02em}
  .tick{font-family:'JetBrains Mono', ui-monospace, monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase}
  .rule{height:1px;background:var(--rule);width:100%}

  .container{max-width:1320px;margin:0 auto;padding:0 40px}
  @media (max-width:780px){.container{padding:0 20px}}

  .reveal{opacity:0;transform:translateY(16px);transition:opacity .9s ease, transform .9s ease}
  .reveal.in{opacity:1;transform:none}

  .marquee{display:flex;gap:64px;animation:scroll 32s linear infinite;white-space:nowrap}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  .btn{display:inline-flex;align-items:center;gap:10px;padding:14px 22px;border-radius:999px;font-weight:500;font-size:15px;transition:transform .2s ease, background .2s ease, color .2s ease, border-color .2s ease;cursor:pointer;border:none;font-family:inherit}
  .btn-primary{background:var(--ink);color:var(--paper)}
  .btn-primary:hover{background:var(--ember-deep);color:var(--paper);transform:translateY(-1px)}
  .btn-primary-light{background:var(--paper);color:var(--ink)}
  .btn-primary-light:hover{background:var(--ember);color:var(--paper);transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--rule)}
  .btn-ghost:hover{border-color:var(--ink);background:rgba(26,22,18,0.05)}
  .btn-ghost-dark{background:transparent;color:var(--paper);border:1px solid var(--rule-light)}
  .btn-ghost-dark:hover{border-color:var(--paper);background:rgba(250,244,226,0.06)}
  .btn-ink{background:var(--ink);color:var(--paper)}
  .btn-ink:hover{background:var(--ember-deep);color:var(--paper)}
  .btn-wa{background:#25D366;color:#fff}
  .btn-wa:hover{background:#1FB954;color:#fff;transform:translateY(-1px)}

  /* Placeholder patterns */
  .ph-stripes{background-image:repeating-linear-gradient(135deg, rgba(244,238,220,0.06) 0 10px, rgba(244,238,220,0.02) 10px 20px);background-color:var(--ink-2)}

  .hero-bg{object-position:center 40%}
  .kenburns{animation:kb 22s ease-in-out infinite alternate}
  @keyframes kb{from{transform:scale(1.04)}to{transform:scale(1.12)}}

  .ornament-num{font-family:'Playfair Display';font-style:italic;font-weight:400;line-height:1}

  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:var(--paper-2)}
  ::-webkit-scrollbar-thumb{background:var(--ink-muted);border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:var(--ember-deep)}

  [dir="rtl"] .marquee{animation-direction:normal}

  .hero-mask{background:linear-gradient(180deg, rgba(26,22,18,0.25) 0%, rgba(26,22,18,0.55) 55%, var(--paper) 100%)}

  .tilt{transition:transform .6s cubic-bezier(.2,.8,.2,1), filter .6s ease}
  .tilt:hover{transform:translateY(-6px) rotate(-0.4deg);filter:brightness(1.08)}

  .ltr{direction:ltr;unicode-bidi:embed;display:inline-block}

  .sticker{transition:transform .3s ease}
  .sticker:hover{transform:rotate(-8deg) scale(1.05)}

  .bleed{width:100vw;margin-left:calc(50% - 50vw);margin-right:calc(50% - 50vw)}

  /* Text-logo — always appears on dark surfaces (Nav over hero + Footer) */
  .text-logo{display:inline-flex;flex-direction:column;align-items:flex-start;line-height:1;letter-spacing:0.02em;color:var(--paper)}
  .text-logo .primary{font-family:'Mamilla','Playfair Display',Georgia,serif;font-weight:600;font-size:22px;letter-spacing:-0.01em;color:var(--paper)}
  .text-logo .secondary{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.25em;margin-top:4px;color:var(--paper-muted);text-transform:uppercase}

  /* Service card highlight */
  .svc-glow{box-shadow:0 0 0 1px var(--ember), 0 30px 80px -40px var(--ember)}

  /* Sticky mobile CTA bar (mobile only) */
  .sticky-cta{
    display:none;
    position:fixed;bottom:0;left:0;right:0;z-index:40;
    background:rgba(26,22,18,0.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border-top:1px solid var(--rule-light);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    align-items:center;gap:10px;
  }
  .sticky-cta .label{flex:1;font-size:13px;color:var(--paper);line-height:1.25}
  .sticky-cta .btn-wa{padding:11px 16px;font-size:13px;white-space:nowrap;gap:6px}

  /* FAQ accordion — lives on light section */
  .faq-item{border-bottom:1px solid var(--rule)}
  .faq-trigger{width:100%;background:transparent;border:none;cursor:pointer;font-family:inherit;color:var(--ink);text-align:right;padding:26px 0;display:flex;align-items:center;justify-content:space-between;gap:20px}
  .faq-trigger:hover{color:var(--ember-deep)}
  .faq-trigger h4{margin:0;font-family:'Mamilla','Playfair Display',Georgia,serif;font-weight:500;font-size:22px;letter-spacing:-0.01em;line-height:1.3;flex:1}
  .faq-icon{width:32px;height:32px;flex-shrink:0;border:1px solid var(--rule);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .3s ease;color:var(--ink)}
  .faq-trigger[aria-expanded="true"] .faq-icon{background:var(--ember-deep);border-color:var(--ember-deep);color:var(--paper);transform:rotate(45deg)}
  .faq-body{max-height:0;overflow:hidden;transition:max-height .45s ease}
  .faq-body-inner{padding:0 0 28px;color:var(--ink-3);font-size:16px;line-height:1.7;max-width:780px;opacity:0.85}

  /* Testimonial card — on light section */
  .testi-card{
    background:var(--paper-2);border:1px solid var(--rule);border-radius:10px;
    padding:32px 30px 28px;display:flex;flex-direction:column;gap:16px;
    transition:transform .35s ease, border-color .35s ease, box-shadow .35s ease;
    position:relative;overflow:hidden;color:var(--ink);
    box-shadow:0 1px 2px rgba(26,22,18,0.04);
  }
  .testi-card:hover{transform:translateY(-4px);border-color:var(--ember-deep);box-shadow:0 20px 50px -20px rgba(26,22,18,0.18)}
  .testi-card::before{
    content:'"';position:absolute;top:-40px;right:14px;font-family:'Playfair Display',Georgia,serif;
    font-size:180px;color:var(--ember-deep);opacity:0.18;line-height:1;font-style:italic;pointer-events:none;
  }
  .testi-stars{color:var(--ember-deep);letter-spacing:2px;font-size:14px}

  /* Credibility strip — sits on dark hero */
  .cred-strip{
    display:flex;align-items:center;justify-content:space-between;
    gap:18px;padding:18px 24px;background:rgba(250,244,226,0.07);
    border:1px solid var(--rule-light);border-radius:12px;
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  }
  .cred-item{display:flex;align-items:center;gap:10px;color:var(--paper);font-size:13px;flex:1;min-width:0}
  .cred-item .ic{width:28px;height:28px;flex-shrink:0;border-radius:50%;background:var(--ember);color:var(--paper);display:flex;align-items:center;justify-content:center;font-size:14px}
  .cred-item .val{font-weight:600}
  .cred-divider{width:1px;height:24px;background:var(--rule-light);flex-shrink:0}

  /* ---------- MOBILE ---------- */
  @media (max-width:860px){
    html{overflow-x:hidden}

    .nav-links{display:none !important}
    nav{padding-top:12px !important;padding-bottom:12px !important}
    nav .container{padding:0 18px 0 22px !important;gap:10px !important}
    nav .btn-primary{padding:8px 14px !important;font-size:12px !important;gap:6px !important;white-space:nowrap}
    nav .btn-primary svg{display:none !important}
    nav .text-logo .primary{font-size:18px !important}
    nav .text-logo .secondary{font-size:8px !important;letter-spacing:0.2em !important}

    section{padding-top:70px !important;padding-bottom:70px !important}

    .m-stack{grid-template-columns:1fr !important;gap:40px !important}

    /* Hero */
    .hero-eyebrow .flex-rule{display:none !important}
    .hero-eyebrow .eyebrow-num{display:none !important}
    .hero-eyebrow{font-size:10px !important;gap:10px !important;flex-wrap:wrap !important}
    .hero-grid{grid-template-columns:1fr !important;gap:36px !important;margin-top:36px !important}
    .hero-headline{font-size:44px !important;line-height:1.02 !important}
    .hero-right{align-items:flex-start !important;flex-direction:row !important;flex-wrap:wrap !important;gap:16px !important;width:100% !important}
    .hero-incl{width:100% !important;flex:1 1 auto !important}
    .hero-cta-row{justify-content:flex-start !important}

    /* Credibility strip: stack 2x2 on mobile */
    .cred-strip{flex-wrap:wrap !important;gap:12px 16px !important;padding:14px 16px !important}
    .cred-item{flex:1 1 45% !important;font-size:12px !important}
    .cred-divider{display:none !important}

    /* Why-Ziv strip: 3 cols → 1 col */
    .why-grid{grid-template-columns:1fr !important}
    .why-grid > div{border-left:none !important;border-bottom:1px solid var(--rule) !important;padding:24px 2px !important}
    .why-grid > div:last-child{border-bottom:none !important}
    .why-grid .ornament-num{font-size:48px !important;margin-bottom:8px !important}

    /* Services: 3 cols → 1 col */
    .svc-grid{grid-template-columns:1fr !important;gap:16px !important}
    .svc-grid > div{padding:28px 22px !important}

    /* Testimonials: 3 cols → 1 col */
    .testi-grid{grid-template-columns:1fr !important;gap:16px !important}

    /* Contact */
    .contact-grid{grid-template-columns:1fr !important;gap:50px !important}

    /* Section heads */
    .section-head{flex-direction:column !important;align-items:flex-start !important;gap:16px !important}

    .h-serif-lg{font-size:38px !important;line-height:1.05 !important}

    .marquee{animation-duration:22s !important}
    .marquee .serif{font-size:26px !important}

    /* Mobile pan on hero */
    .kenburns{animation:mobilePan 16s ease-in-out infinite alternate !important}
    @keyframes mobilePan{
      from{transform:scale(1.35) translateX(7%)}
      to  {transform:scale(1.35) translateX(-7%)}
    }

    /* FAQ */
    .faq-trigger h4{font-size:17px !important}
    .faq-trigger{padding:20px 0 !important}
    .faq-body-inner{font-size:15px !important}

    /* Footer big italic word */
    .footer-word{font-size:56px !important;letter-spacing:-0.02em !important}
    .quote-mark{font-size:80px !important}

    .container{padding:0 18px !important}

    /* Sticky CTA visible on mobile only */
    .sticky-cta{display:flex !important}

    /* Give content space above sticky bar */
    body{padding-bottom:68px}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

const WHATSAPP_NUMBER = '972507386157';
const PHONE_DISPLAY = '050-738-6157';

const SERVICES = [
  {
    id:'private', roman:'I', name:'ארוחות שף פרטיות',
    tagline:'האינטימי.',
    blurb:'ארוחה אינטימית של 6–30 איש, אצלכם בבית או בחצר. תפריט טעימות אישי, הגשה של מסעדת שף, ואתם יושבים עם האורחים — לא במטבח.',
    suitable:['ימי הולדת','ארוחות זוגיות','אירוח עסקי','חגים משפחתיים'],
    size:'6–30 אורחים',
  },
  {
    id:'catering', roman:'II', name:'קייטרינג לאירועים',
    tagline:'הגדול.',
    blurb:'חתונות, בר/בת מצווה, אירועי חברה, ימי הולדת גדולים. מתפריט קוקטייל עד ארוחה מלאה בישיבה. מגיעים עם צוות, ציוד והגשה.',
    suitable:['חתונות','בר / בת מצווה','אירועי חברה','ימי הולדת'],
    size:'30–500 אורחים',
  },
  {
    id:'workshop', roman:'III', name:'סדנאות בישול',
    tagline:'המעשי.',
    blurb:'חוויה מעשית לצוותי חברה או קבוצות פרטיות. לומדים טכניקות אמיתיות של מטבח מקצועי, מבשלים ביחד, ואוכלים את מה שהכנו.',
    suitable:['ימי גיבוש','מתנה מיוחדת','חברות קרובות','לקוחות VIP'],
    size:'8–24 משתתפים',
  },
];

const buildWhatsAppURL = (svcId) => {
  const s = SERVICES.find(x => x.id === svcId);
  const svcLine = s ? `השירות שמעניין אותי: ${s.name}` : 'עוד לא החלטתי על סוג האירוע.';
  const lines = [
    'היי זיו 👋',
    'אשמח לקבל הצעה לאירוע.',
    '',
    svcLine,
    '',
    'פרטים נוספים:',
    '• תאריך משוער:',
    '• מספר אורחים:',
    '• מיקום:',
    '• הערות:',
  ];
  return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(lines.join('\n'))}`;
};

const buildGenericWA = () => {
  const lines = [
    'היי זיו 👋',
    'ראיתי את דף הנחיתה ואשמח לשמוע פרטים על האירוע שלי.',
    '',
    '• תאריך משוער:',
    '• מספר אורחים:',
    '• סוג האירוע:',
    '• מיקום:',
  ];
  return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(lines.join('\n'))}`;
};

// ---------- Logo (text only) ----------
const Logo = () => (
  <a href="#" aria-label="זיו אהרונוב" className="text-logo">
    <span className="primary">Ziv Aharonov</span>
    <span className="secondary">CHEF · EVENTS · 35 YEARS</span>
  </a>
);

// ---------- Nav ----------
const Nav = () => {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  const items = [
    { href: '#about',    label: 'הסיפור' },
    { href: '#services', label: 'השירותים' },
    { href: '#why',      label: 'למה זיו' },
    { href: '#faq',      label: 'שאלות נפוצות' },
  ];
  return (
    <nav style={{
      position:'fixed',top:0,left:0,right:0,zIndex:50,
      padding: scrolled ? '14px 0' : '22px 0',
      background: scrolled ? 'rgba(26,22,18,0.9)' : 'transparent',
      backdropFilter: scrolled ? 'blur(12px) saturate(140%)' : 'none',
      WebkitBackdropFilter: scrolled ? 'blur(12px) saturate(140%)' : 'none',
      borderBottom: scrolled ? '1px solid var(--rule-light)' : '1px solid transparent',
      transition:'all .35s ease'
    }}>
      <div className="container" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:20}}>
        <Logo />
        <div style={{display:'flex',gap:32,alignItems:'center'}} className="nav-links">
          {items.map(i =>
            <a key={i.href} href={i.href} style={{fontSize:14,color:'var(--paper)',opacity:0.85,transition:'opacity .2s'}}
               onMouseEnter={e=>e.currentTarget.style.opacity=1}
               onMouseLeave={e=>e.currentTarget.style.opacity=0.85}>{i.label}</a>
          )}
        </div>
        <a href="#contact" className="btn btn-primary" style={{padding:'10px 18px',fontSize:13}}>
          קבלת הצעה
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
      </div>
    </nav>
  );
};

// ---------- Hero ----------
const Hero = () => {
  return (
    <section style={{position:'relative',minHeight:'100vh',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,zIndex:0}}>
        <div style={{
          width:'100%',height:'100%',position:'relative',
          background:`
            radial-gradient(ellipse 60% 50% at 25% 20%, rgba(180,90,40,0.45) 0%, transparent 60%),
            radial-gradient(ellipse 55% 45% at 80% 85%, rgba(220,130,60,0.22) 0%, transparent 60%),
            linear-gradient(180deg, #1A1612 0%, #0E0C09 100%)
          `
        }}>
          <div style={{
            position:'absolute',inset:0,
            backgroundImage:'repeating-linear-gradient(135deg, rgba(244,238,220,0.025) 0 14px, transparent 14px 28px)',
            pointerEvents:'none'
          }}/>
          <div className="hand" style={{
            position:'absolute',top:'18%',left:'8%',
            fontSize:'clamp(140px, 22vw, 320px)',color:'var(--ember)',opacity:0.08,
            lineHeight:1,transform:'rotate(-6deg)',pointerEvents:'none',userSelect:'none'
          }}>Bon Appétit</div>
        </div>
        <div className="hero-mask" style={{position:'absolute',inset:0}}/>

// ---------- Sticky mobile CTA ----------
const StickyMobileCTA = () => {
  const [show, setShow] = useState(false);
  useEffect(() => {
    const h = () => setShow(window.scrollY > 600);
    window.addEventListener('scroll', h);
    h();
    return () => window.removeEventListener('scroll', h);
  }, []);
  return (
    <div className="sticky-cta" style={{opacity: show ? 1 : 0, pointerEvents: show ? 'auto' : 'none', transition:'opacity .3s'}}>
      <div className="label">רוצים הצעה <strong>לאירוע שלכם?</strong></div>
      <a href={buildGenericWA()} target="_blank" rel="noopener" className="btn btn-wa">

        וואטסאפ
      </a>
    </div>
  );
};

// ---------- App ----------
const App = () => {

    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold:0.08 });
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav />
      <Hero />
      <MarqueeBand />
      <About />
      <Services />
      <WhyZiv />
      <Testimonials />
      <Quote />
      <FAQ />
